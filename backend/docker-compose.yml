services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic_pass
      POSTGRES_DB: clinicdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — open http://localhost:8025 to see captured emails

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      - db
      - mailpit
    environment:
      DATABASE_URL: postgresql://clinic:clinic_pass@db:5432/clinicdb
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_FROM: clinic@clinic.app
    ports:
      - "4000:4000"

volumes:
  postgres_data:
